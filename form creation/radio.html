<html>
    <head>
        <!-- 5 tags - title,meta,style,link,script -->
        <title>Radio Button Example</title>
    </head>
    <body>
        <form action="/submit">
            <h2>Choose your favorite programming language:</h2>
            <label><input type="radio" name="language" value="python" /> Python</label><br>
            <label><input type="radio" name="language" value="javascript" /> JavaScript</label><br>
            <label><input type="radio" name="language" value="java" /> Java</label><br>
            <label><input type="radio" name="language" value="csharp" /> C#</label><br>
            <label><input type="radio" name="language" value="ruby" /> Ruby</label><br><br>
            <h2>Select your hobbies:</h2>
            <label><input type="checkbox" name="hobby" value="reading" /> Reading</label><br>
            <label><input type="checkbox" name="hobby" value="traveling" /> Traveling</label><br>
            <label><input type="checkbox" name="hobby" value="cooking" /> Cooking</label><br>
            <label><input type="checkbox" name="hobby" value="sports" /> Sports</label><br>
            <label><input type="checkbox" name="hobby" value="music" /> Music</label><br><br>
            <input type="submit" value="Submit"/>
        </form>
    </body>
</html>
