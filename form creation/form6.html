<html>
    <head>
        <!--  5 tags - title,meta,style,link,script -->
        <title>Shipping Address Form</title>
    </head>
    <body>
        <form>
            <h2>
                Shipping Address Form
            </h2>
            <hr>
            <label>Phone Number * </label>
            <input type="tel" placeholder="123-456-7890" /> <br><br>
            <label>Company</label>
            <input type="text" /> <br><br>
            <label>Country * </label>
            <select>
                <option value="India">India</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
                <option value="Australia">Australia</option>
            </select><br><br>
            <label>Street Address * </label>
            <input type="text" placeholder="Victoria street" /> <br><br>
                <input type="text"  /> <br><br>
            <label>suburb* </label>
            <input type="text" placeholder="Richmond" /> <br><br>
            <label>Zip/Postal Code * </label>
            <input type="text" placeholder="12345" /> <br><br>
            <label>Save in address book</label>
            <input type="checkbox" /> <br><br>
            <input type="submit" value="CANCEL"/>
            <input type="submit" value="SAVE ADDRESS"/>
        </form>
    </body>
</html>
