<html>
    <head>
        <!--  5 tags - title,meta,style,link,script -->
        <title>Heeddata</title>
    </head>
    <body>
        <form> 
            <input type="text" placeholder="name"/> <br><br>
            <input type="number" placeholder="10-digit mobile number"/> <br><br>
            <input type="pincode" placeholder="Pincode"/> <br><br>
            <input type="text" placeholder="Locality"/> <br><br>
            <input type="text" placeholder="Address"/> <br><br>
            <input type="text" placeholder="City/District/Town"/> <br><br>
            <input type="text" placeholder="State"/>
            <select>
                <option value="">--Select State--</option>
                <option value="India">India</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
                <option value="Australia">Australia</option>
            </select>
            <br><br>
            <input type="number" placeholder="Landmark(Optional)"/> <br><br>
            <input type="number" placeholder="Alternate phone(Optional)"/> <br><br>
            <p>Address Type</p>
            <input type="radio" name="addressType" value="home"/> Home <br>
            <input type="radio" name="addressType" value="work"/> Work <br><br>
            <input type="submit" value="SAVE"/>
            <input type="submit" value="CANCEL"/>
        </form>
    </body>
</html>
