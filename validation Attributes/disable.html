<html>
    <head> <title>Required Attribute Example</title> </head>
    <body>
        <form action="/login">
            <label>Email</label>
            <input type="email" required>
            <br><br>
            <label>Password</label>
            <input type="password" required>
            <br><br>
            <input type="submit" value="login" disabled>
        </form>
    </body>
</html>
